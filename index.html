<style>
:root{

  --blue-dark:#3E5FA8;
  --teal:#16B8A6;

  --green-soft:#E6F6EE;

  --ink:#1F2A44;

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Plus Jakarta Sans',-apple-system,system-ui,sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;
}
h1,h2,h3{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;letter-spacing:-.3px}

/* ===== LAYOUT SHELL ===== */
.shell{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar);background:var(--surface);border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;
  transition:transform .25s;
}
.sidebar .brand{padding:24px 22px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--line)}
.sidebar .brand .mark{font-weight:800;font-size:20px;color:var(--ink);letter-spacing:-.5px}
.sidebar .brand .mark .off{background:var(--green);color:#fff;padding:1px 8px;border-radius:7px;margin-left:5px}
.nav{padding:14px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
.nav a{
  display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;
  color:var(--muted);font-weight:600;font-size:14px;cursor:pointer;text-decoration:none;transition:.15s;
}
.nav a:hover{background:var(--surface-2);color:var(--ink)}
.nav a.active{background:var(--green-soft);color:var(--green)}
.nav a .ic{width:20px;text-align:center;font-size:16px}
.nav .sep{height:1px;background:var(--line);margin:10px 6px}
.side-foot{padding:16px 18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
.side-foot b{color:var(--ink);display:block;font-size:13px;margin-bottom:2px}

.main{flex:1;margin-left:var(--sidebar);min-width:0}
.topbar-m{display:none}
.content{max-width:1000px;margin:0 auto;padding:30px 28px 90px}
.page-title{font-size:26px;margin-bottom:22px;display:flex;align-items:center;gap:12px}

/* ===== COMPONENTES ===== */
.btn{border:none;border-radius:10px;padding:12px 20px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;transition:.16s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-dark)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{filter:brightness(1.05)}
.btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:#fff;color:var(--danger);border:1px solid #f3c9cb}
.btn-danger:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-sm{padding:8px 14px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed}

.card{background:var(--surface);border-radius:var(--radius);padding:24px;margin-bottom:18px;border:1px solid var(--line)}

input,select,textarea{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:15px;background:var(--surface);color:var(--ink);transition:.15s}
textarea{resize:vertical;min-height:90px;line-height:1.5}
input::placeholder,textarea::placeholder{color:#aab3c2}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,118,199,.12)}
label{font-weight:600;font-size:12px;display:block;margin:14px 0 6px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>div{flex:1;min-width:140px}

.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:600}
.pill-blue{background:rgba(79,118,199,.12);color:var(--blue)}
.pill-green{background:var(--green-soft);color:var(--green)}
.pill-gray{background:var(--surface-2);color:var(--muted);border:1px solid var(--line)}
.pill-amber{background:rgba(245,166,35,.14);color:#B57A11}

.search-box{position:relative}
.search-box input{padding-left:42px}
.search-box::before{content:"⌕";position:absolute;left:14px;top:9px;font-size:21px;color:var(--muted)}

.muted{color:var(--muted);font-size:14px}
.center{text-align:center}
.hidden{display:none!important}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:18px}
.stat{background:var(--surface);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--line)}
.stat .n{font-size:28px;font-weight:800;color:var(--blue);line-height:1}
.stat .l{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-top:5px}

/* ===== EVENT CARD (estilo VIPme) ===== */
.ev-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;border-left:4px solid var(--green)}
.ev-card .body{padding:20px 22px}
.ev-card .date{color:var(--green);font-weight:700;font-size:15px}
.ev-card h3{font-size:19px;margin:2px 0 6px;color:var(--ink)}
.ev-card .loc{color:var(--muted);font-size:13px;margin-bottom:12px}
.ev-card .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
.ev-card .foot{display:flex;gap:8px;flex-wrap:wrap;padding:14px 22px;border-top:1px solid var(--line);background:var(--surface-2)}

.list-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:10px;border:1px solid var(--line);margin-bottom:8px;background:var(--surface);transition:.15s}
.list-row.in{background:var(--green-soft);border-color:#bfe6d2}
.list-row .nm{font-weight:600;flex:1}
.list-row .wpp{font-size:13px;color:var(--muted)}
.sex-m{color:#3B82F6}.sex-f{color:#E0539B}.sex-o{color:var(--muted)}

.linkbox{display:flex;gap:8px;align-items:center;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:8px 8px 8px 12px;margin-top:10px}
.linkbox input{border:none;background:transparent;font-size:13px;padding:4px;color:var(--blue)}
.linkbox input:focus{box-shadow:none}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:10px;font-weight:600;font-size:14px;transition:.3s;z-index:999;box-shadow:0 10px 30px -8px rgba(0,0,0,.3)}
.toast.show{transform:translateX(-50%) translateY(0)}

.fab-back{background:none;border:none;color:var(--muted);font-weight:600;cursor:pointer;font-size:14px;margin-bottom:16px;display:inline-flex;gap:6px;align-items:center}
.fab-back:hover{color:var(--blue)}
.loader{text-align:center;padding:40px;color:var(--muted)}
.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty .ic{font-size:42px;margin-bottom:10px;opacity:.4}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(20,28,46,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--surface);border-radius:16px;padding:26px;max-width:460px;width:100%;max-height:90vh;overflow:auto}
.modal h2{font-size:21px;margin-bottom:4px}

/* ===== LANDING (3 acessos) ===== */
.landing-wrap{max-width:560px;margin:0 auto;padding:60px 24px}
.hero{text-align:center;margin-bottom:34px}
.hero .mark{font-weight:800;font-size:40px;letter-spacing:-1.5px;color:var(--ink)}
.hero .mark .off{background:var(--green);color:#fff;padding:0 14px;border-radius:12px}
.hero p{color:var(--muted);margin-top:12px;font-size:16px}
.access-card{display:flex;align-items:center;gap:16px;padding:22px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--line);margin-bottom:14px;cursor:pointer;transition:.18s;text-align:left;width:100%;font-family:inherit}
.access-card:hover{transform:translateY(-2px);border-color:var(--blue);box-shadow:0 14px 30px -16px rgba(79,118,199,.4)}
.access-card .ico{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex:none}
.access-card .ico.b{background:rgba(79,118,199,.12)}
.access-card .ico.g{background:var(--green-soft)}
.access-card .txt{flex:1}
.access-card .txt h3{font-size:18px;margin-bottom:2px}
.access-card .txt p{color:var(--muted);font-size:13px}
.access-card .arr{color:var(--blue);font-size:20px}
.admin-foot{text-align:center;margin-top:26px}
.admin-foot button{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;opacity:.6;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.admin-foot button:hover{opacity:1;color:var(--blue)}

.login-wrap{max-width:400px;margin:60px auto;padding:0 20px}

/* ===== MOBILE ===== */
.menu-btn{display:none}
.backdrop{display:none}
@media(max-width:820px){
  .sidebar{transform:translateX(-100%);box-shadow:0 0 40px rgba(0,0,0,.2)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .topbar-m{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40}
  .topbar-m .mark{font-weight:800;font-size:18px}
  .topbar-m .mark .off{background:var(--green);color:#fff;padding:1px 7px;border-radius:6px;margin-left:4px}
  .menu-btn{display:inline-flex;background:none;border:none;font-size:24px;cursor:pointer;color:var(--ink);line-height:1}
  .backdrop.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:45}
  .content{padding:20px 16px 80px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}
</style>

<div class="shell">
  <div class="backdrop" id="backdrop" onclick="toggleMenu(false)"></div>

    <div class="brand"><span class="mark">LISTA<span class="off">OFF</span></span></div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot" id="sideFoot"></div>
  </aside>
  <div class="main">
    <div class="topbar-m">
      <button class="menu-btn" onclick="toggleMenu(true)">☰</button>
      <span class="mark">LISTA<span class="off">OFF</span></span>
    </div>
    <div class="content" id="app"><div class="loader">carregando…</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div id="modalRoot"></div>
<script>
/* =================== UTIL =================== */
const $ = s => document.querySelector(s);
const app = $("#app");
let DB, FB;

function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2600);}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function sexLabel(s){return s==="M"?"Masculino":s==="F"?"Feminino":"Outro";}
function sexClass(s){return s==="M"?"sex-m":s==="F"?"sex-f":"sex-o";}
function fmtBRL(v){return "R$ "+Number(v||0).toFixed(2).replace(".",",");}
function baseUrl(){return location.origin+location.pathname;}
function fmtData(d){return d?new Date(d+'T00:00').toLocaleDateString('pt-BR'):'sem data';}
function ordEvDocs(docs){return [...docs].sort((a,b)=>{const da=a.data().data||"",db=b.data().data||"";if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return da<db?-1:da>db?1:0;});}

// senhas / whatsapp (definidos no topo do arquivo)
function toggleMenu(open){
  $("#sidebar").classList.toggle("open",open);
  $("#backdrop").classList.toggle("show",open);
}

/* =================== ROUTER =================== */
function route(){
  clearWatchers();
  if(window._clearListeners) window._clearListeners();
  toggleMenu(false);
  const p = new URLSearchParams(location.search);
  const v = p.get("v");
  // público (link de cadastro)
  if(p.get("lista") && !p.get("admin")) return renderPublic(p.get("ev"), p.get("lista"));
  if(v==="portaria") return guardPortaria();
  if(v==="parceiro") return renderParceiro();
  if(v==="admin"||v==="banco"||v==="relatorios" || (p.get("ev")&&!p.get("lista"))) return guardAdmin();
  return renderLanding();
}
function go(params){
  const u=new URL(location.href); u.search=new URLSearchParams(params).toString();
  history.pushState({},"",u); route();
}
window.addEventListener("popstate", route);
window.go=go; window.toggleMenu=toggleMenu;

/* ---- gerenciador de listeners (desinscreve ao trocar de tela) ---- */
let _watchers=[];
function watch(ref, cb){ const unsub=FB.onSnapshot(ref, cb); _watchers.push(unsub); return unsub; }
function clearWatchers(){ _watchers.forEach(u=>{try{u&&u()}catch(e){}}); _watchers=[]; }

/* =================== FIREBASE READY =================== */
function onFbReady(){
  FB=window._fb; DB=FB.db;
  if(firebaseConfig.apiKey==="COLE_AQUI"){
    document.querySelector(".shell").innerHTML=`<div class="content"><div class="card center"><h2>⚠️ Falta configurar o Firebase</h2><p class="muted" style="margin-top:8px">Cole a config do seu projeto Firebase no topo do arquivo (bloco PASSO 1) e suba de novo.</p></div></div>`;
    return;
  }
  route();
}
window.addEventListener("fb-ready", ()=>{ window._readyFired=true; });
// roda o app só quando a página inteira (todos os scripts) terminou de carregar
function bootApp(){ if(window._fb && (window._readyFired||window._fbReady)) onFbReady(); else setTimeout(bootApp,30); }
if(document.readyState==="complete") bootApp();
else window.addEventListener("load", bootApp);

/* =================== SIDEBAR =================== */
function renderSidebar(active){
  const items=[
    {k:"admin",   ic:"📅", label:"Eventos"},
    {k:"portaria",ic:"🎟️", label:"Portaria"},
    {k:"banco",   ic:"📇", label:"Banco de Dados"},
    {k:"relatorios",ic:"📊",label:"Relatórios"},
  ];
  $("#nav").innerHTML = items.map(i=>
    `<a class="${active===i.k?'active':''}" onclick="go({v:'${i.k}'})"><span class="ic">${i.ic}</span>${i.label}</a>`
  ).join("") + `<div class="sep"></div>
    <a onclick="go({})"><span class="ic">↩︎</span>Tela inicial</a>`;
  $("#sideFoot").innerHTML=`<b>Admin Geral</b>logado`;
}
function showShell(show){
  document.querySelector(".sidebar").style.display = show?"":"none";
  document.querySelector(".topbar-m").style.display = show?"":"none";
  document.querySelector(".main").style.marginLeft = show?"":"0";
}

/* =================== LANDING =================== */
function renderLanding(){
  showShell(false);
  app.closest(".main").style.marginLeft="0";
  app.innerHTML=`<div class="landing-wrap">
    <div class="hero">
      <div class="mark">LISTA<span class="off">OFF</span></div>
      <p>O jeito mais rápido de gerenciar listas do seu rolê.</p>
    </div>
    <button class="access-card" onclick="go({v:'portaria'})">
      <div class="ico b">🎟️</div>
      <div class="txt"><h3>Acesso à Portaria</h3><p>Login da equipe que faz o check-in na entrada.</p></div>
      <div class="arr">→</div>
    </button>
    <button class="access-card" onclick="go({v:'parceiro'})">
      <div class="ico g">🚀</div>
      <div class="txt"><h3>Quero a Lista OFF no meu evento</h3><p>Fale com a gente e comece a usar.</p></div>
      <div class="arr">→</div>
    </button>
    <div class="admin-foot"><button onclick="go({v:'admin'})">· admin geral ·</button></div>
  </div>`;
}

/* =================== FORM PARCEIRO =================== */
const WHATSAPP_DESTINO = "5538991710202";
function renderParceiro(){
  showShell(false);
  app.innerHTML=`<div class="login-wrap">
    <button class="fab-back" onclick="go({})">← voltar</button>
    <div class="card">
      <h2>Quero a Lista OFF 🚀</h2>
      <p class="muted" style="margin-bottom:6px">Preenche aí que a gente fala com você no WhatsApp.</p>
      <label>Seu nome</label><input id="paNome" placeholder="Nome completo">
      <label>WhatsApp (com DDD)</label><input id="paWpp" placeholder="(38) 9 9999-9999" inputmode="tel">
      <label>Ramo de atividade</label><input id="paRamo" placeholder="Ex: balada, bar, produtora de eventos…">
      <button class="btn btn-green" style="width:100%;margin-top:20px" id="paSend">Começar →</button>
    </div></div>`;
  $("#paSend").onclick=()=>{
    const nome=$("#paNome").value.trim(),wpp=$("#paWpp").value.trim(),ramo=$("#paRamo").value.trim();
    if(nome.length<3) return toast("Digite seu nome");
    if(wpp.replace(/\D/g,"").length<10) return toast("WhatsApp inválido");
    if(!ramo) return toast("Digite o ramo de atividade");
    const msg=`Olá! Quero colocar a *Lista OFF* no meu evento.%0A%0A*Nome:* ${encodeURIComponent(nome)}%0A*WhatsApp:* ${encodeURIComponent(wpp)}%0A*Ramo:* ${encodeURIComponent(ramo)}`;
    window.open(`https://wa.me/${WHATSAPP_DESTINO}?text=${msg}`,"_blank");
    app.innerHTML=`<div class="login-wrap"><div class="card center"><h2>Tudo certo! ✅</h2><p class="muted" style="margin-top:8px">Abrimos o WhatsApp pra você enviar a mensagem.</p><button class="btn btn-ghost" style="margin-top:16px" onclick="go({})">voltar ao início</button></div></div>`;
  };
}

/* =================== LOGIN =================== */
function loginScreen(titulo, onOk){
  showShell(false);
  app.innerHTML=`<div class="login-wrap">
    <button class="fab-back" onclick="go({})">← voltar</button>
    <div class="card">
      <h2>${titulo}</h2>
      <label>Senha</label>
      <input id="pw" type="password" placeholder="senha de acesso">
      <button class="btn btn-primary" style="width:100%;margin-top:18px" id="logBtn">Entrar</button>
    </div></div>`;
  const t=()=>onOk($("#pw").value);
  $("#logBtn").onclick=t;
  $("#pw").addEventListener("keydown",e=>{if(e.key==="Enter")t();});
}
function guardAdmin(){
  if(sessionStorage.adminOk==="1"){ showShell(true); return renderAdminRoute(); }
  loginScreen("Admin Geral 🔐",(pw)=>{if(pw===SENHA_ADMIN){sessionStorage.adminOk="1";showShell(true);renderAdminRoute();}else toast("Senha incorreta");});
}
function guardPortaria(){
  if(sessionStorage.portOk==="1"){ showShell(true); return renderPortariaRoute(); }
  loginScreen("Portaria 🎟️",(pw)=>{if(pw===SENHA_PORTARIA||pw===SENHA_ADMIN){sessionStorage.portOk="1";showShell(true);renderPortariaRoute();}else toast("Senha incorreta");});
}
</script>
<script>
/* =================== ADMIN ROUTER =================== */
function renderAdminRoute(){
  const p=new URLSearchParams(location.search);
  if(p.get("v")==="banco") return renderBanco();
  if(p.get("v")==="relatorios") return renderRelatorios();
  if(p.get("ev")) return renderEventoDetalhe(p.get("ev"));
  return renderEventos();
}

/* =================== EVENTOS (lista estilo VIPme) =================== */
function renderEventos(){
  renderSidebar("admin");
  app.innerHTML=`
    <h1 class="page-title">Eventos</h1>
    <div class="card">
      <h2 style="font-size:18px;margin-bottom:4px">Criar evento</h2>
      <p class="muted" style="margin-bottom:6px">Ex: Japa NK</p>
      <div class="row">
        <div><label>Nome do evento</label><input id="evNome" placeholder="Nome do evento"></div>
        <div><label>Data</label><input id="evData" type="date"></div>

      <label>Local (opcional)</label>
      <input id="evLocal" placeholder="Ex: Seu Cupido Bar · Montes Claros">
      <label>Descrição (aparece no link de cadastro)</label>
      <textarea id="evDesc" placeholder="Ex: Sexta, a partir das 22h&#10;Open bar até meia-noite&#10;Aperte Enter para uma nova linha" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="btn btn-primary" style="margin-top:16px" id="evCriar">+ Criar evento</button>
    </div>
    <div class="search-box" style="margin-bottom:16px"><input id="evBusca" placeholder="buscar evento…"></div>
    <div id="evLista"><div class="loader">carregando…</div></div>`;

  $("#evCriar").onclick=async()=>{
    const nome=$("#evNome").value.trim(),data=$("#evData").value,local=$("#evLocal").value.trim(),descricao=$("#evDesc").value.trim();
    if(!nome) return toast("Digite o nome do evento");
    await FB.addDoc(FB.collection(DB,"eventos"),{nome,data,local,descricao,criadoEm:FB.serverTimestamp()});
    $("#evNome").value="";$("#evData").value="";$("#evLocal").value="";$("#evDesc").value="";$("#evDesc").style.height="auto";
    toast("Evento criado! 🎉");
  };

  let allEv=[];
  const draw=(filtro="")=>{
    const f=filtro.toLowerCase();
    const arr=allEv.filter(e=>(e._d.nome||"").toLowerCase().includes(f));
    if(!arr.length){$("#evLista").innerHTML=`<div class="empty"><div class="ic">📅</div>Nenhum evento ${filtro?'encontrado':'ainda. Crie o primeiro!'}</div>`;return;}
    $("#evLista").innerHTML=arr.map(o=>{
      const e=o._d,c=o._cont;
      const pres=`${c.checkin}/${c.total}`;
      return `<div class="ev-card">
        <div class="body" onclick="go({ev:'${o.id}'})" style="cursor:pointer">
          <div class="date">${fmtData(e.data)}</div>
          <h3>${esc(e.nome)}</h3>
          ${e.local?`<div class="loc">📍 ${esc(e.local)}</div>`:''}
          <div class="meta">
            <span class="pill pill-green">Presentes: ${pres}</span>
            <span class="pill pill-gray">${c.f}♀ / ${c.m}♂${c.o?` / ${c.o}⚧`:''}</span>
          </div>
        </div>
        <div class="foot">
          <button class="btn btn-primary btn-sm" onclick="go({ev:'${o.id}'})">Gerenciar listas</button>
          <button class="btn btn-ghost btn-sm" onclick="editarEvento('${o.id}')">✏️ editar</button>
          <button class="btn btn-danger btn-sm" onclick="apagarEvento('${o.id}','${esc(e.nome).replace(/'/g,"\\'")}')">🗑️ apagar</button>
        </div>
      </div>`;
    }).join("");
  };

  watch(FB.query(FB.collection(DB,"eventos"),FB.orderBy("criadoEm","desc")),async snap=>{
    const docs=snap.docs;
    allEv=await Promise.all(docs.map(async d=>({id:d.id,_d:d.data(),_cont:await contarEvento(d.id)})));
    // ordena pela data do evento (mais próximo primeiro); sem data vai pro fim
    allEv.sort((a,b)=>{const da=a._d.data||"",db=b._d.data||""; if(!da&&!db)return 0; if(!da)return 1; if(!db)return -1; return da<db?-1:da>db?1:0;});
    draw($("#evBusca")?$("#evBusca").value:"");
  });
  // busca (delegada porque o input persiste)
  setTimeout(()=>{const b=$("#evBusca"); if(b) b.oninput=e=>draw(e.target.value);},50);
}

async function contarEvento(evId){
  let total=0,f=0,m=0,o=0,checkin=0;
  const listas=await FB.getDocs(FB.collection(DB,"eventos",evId,"listas"));
  for(const l of listas.docs){
    const cads=await FB.getDocs(FB.collection(DB,"eventos",evId,"listas",l.id,"cadastros"));
    cads.forEach(c=>{const x=c.data();total++;if(x.sex==="F")f++;else if(x.sex==="M")m++;else o++;if(x.checkin)checkin++;});
  }
  return {total,f,m,o,checkin};
}

async function apagarEvento(evId,nome){
  openConfirm(`Apagar o evento "<b>${esc(nome)}</b>" e TODAS as suas listas e cadastros? Isso não pode ser desfeito.`, async()=>{
    // apaga subcoleções
    const listas=await FB.getDocs(FB.collection(DB,"eventos",evId,"listas"));
    for(const l of listas.docs){
      const cads=await FB.getDocs(FB.collection(DB,"eventos",evId,"listas",l.id,"cadastros"));

}

  const p=new URLSearchParams(location.search);
  if(p.get("ev")&&p.get("lista")) return renderPortariaLista(p.get("ev"),p.get("lista"));
  if(p.get("ev")&&p.get("todas")) return renderPortariaUnificada(p.get("ev"));
  return renderPortariaPick();
}
async function renderPortariaPick(){
  renderSidebar("portaria");
  app.innerHTML=`<h1 class="page-title">Portaria 🎟️</h1><p class="muted" style="margin-bottom:16px">Escolha o evento — veja todos os nomes juntos ou por lista.</p><div id="ppEv"><div class="loader">carregando…</div></div>`;
  const eventos=await FB.getDocs(FB.query(FB.collection(DB,"eventos"),FB.orderBy("criadoEm","desc")));
  let h="";
  for(const ev of ordEvDocs(eventos.docs)){
    const e=ev.data(); const listas=await FB.getDocs(FB.collection(DB,"eventos",ev.id,"listas"));
    h+=`<div class="card"><div class="date" style="color:var(--green);font-weight:700">${fmtData(e.data)}</div>
      <h3 style="font-size:18px;margin:2px 0 12px">${esc(e.nome)}</h3>
      <button class="btn btn-green" style="width:100%;margin-bottom:12px" onclick="go({v:'portaria',ev:'${ev.id}',todas:'1'})">👥 Ver todos os nomes (lista unificada)</button>`;
    if(listas.empty)h+=`<p class="muted">sem listas</p>`;
    else{h+=`<p class="muted" style="font-size:12px;margin-bottom:6px">ou por lista:</p>`;
      listas.forEach(l=>{h+=`<div class="list-row" style="cursor:pointer" onclick="go({v:'portaria',ev:'${ev.id}',lista:'${l.id}'})"><div class="nm">${esc(l.data().nome)}</div><span class="pill pill-blue">check-in →</span></div>`;});}
    h+=`</div>`;
  }
  $("#ppEv").innerHTML=h||`<div class="empty"><div class="ic">📅</div>Nenhum evento.</div>`;
}
async function renderPortariaUnificada(evId){
  renderSidebar("portaria");
  const evSnap=await FB.getDoc(FB.doc(DB,"eventos",evId)); const ev=evSnap.data();
  app.innerHTML=`
    <button class="fab-back" onclick="go({v:'portaria'})">← trocar evento</button>
    <h1 style="font-size:24px">${esc(ev.nome)}</h1>
    <p class="muted">Todos os nomes de todas as listas, em ordem alfabética.</p>
    <div class="stat-grid" id="ustats" style="margin:14px 0"></div>
    <div class="search-box" style="margin-bottom:14px"><input id="uSearch" placeholder="buscar nome…" autofocus></div>
    <div id="uList"><div class="loader">carregando…</div></div>`;
  const listas=await FB.getDocs(FB.collection(DB,"eventos",evId,"listas"));
  const nomeLista={}; listas.docs.forEach(l=>nomeLista[l.id]=l.data().nome);
  let cache=[];
  const draw=(filter="")=>{
    const f=filter.toLowerCase(); const arr=cache.filter(c=>(c.nomeLower||"").includes(f));
    let h=""; if(!arr.length)h=`<div class="empty"><div class="ic">🔍</div>Nenhum nome encontrado.</div>`;
    arr.forEach(c=>{h+=`<div class="list-row ${c.checkin?'in':''}">
      <span class="${sexClass(c.sex)}">${c.sex==="F"?"♀":c.sex==="M"?"♂":"⚧"}</span>
      <div style="flex:1"><div class="nm">${esc(c.nome)}</div><div class="wpp">${esc(c.wpp)} · <b style="color:var(--blue)">${esc(nomeLista[c._lista]||"")}</b>${c._valor>0?` · ${fmtBRL(c._valor)}`:''}</div></div>
      ${c.checkin?`<button class="btn btn-ghost btn-sm" onclick="setCheck('${evId}','${c._lista}','${c.id}',false)">desfazer</button>`:`<button class="btn btn-green btn-sm" onclick="setCheck('${evId}','${c._lista}','${c.id}',true)">✓ entrou</button>`}</div>`;});
    $("#uList").innerHTML=h;
  };
  const refresh=async()=>{
    const todos=[];
    for(const l of listas.docs){const cads=await FB.getDocs(FB.collection(DB,"eventos",evId,"listas",l.id,"cadastros"));cads.forEach(d=>todos.push({id:d.id,_lista:l.id,_valor:l.data().valor||0,...d.data()}));}
    todos.sort((a,b)=>(a.nomeLower||"").localeCompare(b.nomeLower||"")); cache=todos;
    const total=todos.length,ins=todos.filter(x=>x.checkin).length,f=todos.filter(x=>x.sex==="F").length,m=todos.filter(x=>x.sex==="M").length;
    $("#ustats").innerHTML=`
      <div class="stat"><div class="n">${ins}</div><div class="l">entraram</div></div>
      <div class="stat"><div class="n">${total-ins}</div><div class="l">faltam</div></div>
      <div class="stat"><div class="n">${f}</div><div class="l">fem</div></div>
      <div class="stat"><div class="n">${m}</div><div class="l">masc</div></div>`;
    draw($("#uSearch").value);
  };
  if(listas.empty){$("#uList").innerHTML=`<div class="empty"><div class="ic">📝</div>Sem listas neste evento.</div>`;$("#ustats").innerHTML="";}
  else listas.docs.forEach(l=>watch(FB.collection(DB,"eventos",evId,"listas",l.id,"cadastros"),()=>refresh()));
  $("#uSearch").oninput=e=>draw(e.target.value);
}
async function renderPortariaLista(evId,listaId){
  renderSidebar("portaria");
  const lSnap=await FB.getDoc(FB.doc(DB,"eventos",evId,"listas",listaId)); const L=lSnap.data();
  app.innerHTML=`
    <button class="fab-back" onclick="go({v:'portaria'})">← trocar lista</button>
    <h1 style="font-size:24px">${esc(L.nome)}</h1>
    ${L.valor>0?`<span class="pill pill-amber">Cobrar ${fmtBRL(L.valor)} de cada pessoa</span>`:`<span class="pill pill-gray">Lista OFF · grátis</span>`}
    <div class="stat-grid" id="pstats" style="margin:14px 0"></div>
    <div class="search-box" style="margin-bottom:14px"><input id="pSearch" placeholder="buscar nome…" autofocus></div>
    <div id="pList"><div class="loader">carregando…</div></div>`;
  let cache=[];
  const draw=(filter="")=>{
    const f=filter.toLowerCase(); const arr=cache.filter(c=>(c.nomeLower||"").includes(f));
    let h=""; if(!arr.length)h=`<div class="empty"><div class="ic">🔍</div>Nenhum nome encontrado.</div>`;
    arr.forEach(c=>{h+=`<div class="list-row ${c.checkin?'in':''}">
      <span class="${sexClass(c.sex)}">${c.sex==="F"?"♀":c.sex==="M"?"♂":"⚧"}</span>
      <div style="flex:1"><div class="nm">${esc(c.nome)}</div><div class="wpp">${esc(c.wpp)}</div></div>
      ${c.checkin?`<button class="btn btn-ghost btn-sm" onclick="setCheck('${evId}','${listaId}','${c.id}',false)">desfazer</button>`:`<button class="btn btn-green btn-sm" onclick="setCheck('${evId}','${listaId}','${c.id}',true)">✓ entrou</button>`}</div>`;});
    $("#pList").innerHTML=h;
  };
  watch(FB.collection(DB,"eventos",evId,"listas",listaId,"cadastros"),snap=>{
    cache=[];snap.forEach(d=>cache.push({id:d.id,...d.data()}));
    cache.sort((a,b)=>(a.nomeLower||"").localeCompare(b.nomeLower||""));
    const total=cache.length,ins=cache.filter(x=>x.checkin).length;
    $("#pstats").innerHTML=`
      <div class="stat"><div class="n">${ins}</div><div class="l">entraram</div></div>
      <div class="stat"><div class="n">${total-ins}</div><div class="l">faltam</div></div>
      <div class="stat"><div class="n">${total}</div><div class="l">total</div></div>`;
    draw($("#pSearch").value);
  });
  $("#pSearch").oninput=e=>draw(e.target.value);
}
window.setCheck=async(evId,listaId,cadId,val)=>{await FB.updateDoc(FB.doc(DB,"eventos",evId,"listas",listaId,"cadastros",cadId),{checkin:val});};

/* =================== PÁGINA PÚBLICA =================== */
async function renderPublic(evId,listaId){
  showShell(false);
  app.innerHTML=`<div class="loader">carregando lista…</div>`;
  try{
    const evSnap=await FB.getDoc(FB.doc(DB,"eventos",evId));
    const lSnap=await FB.getDoc(FB.doc(DB,"eventos",evId,"listas",listaId));
    if(!evSnap.exists()||!lSnap.exists()){app.innerHTML=`<div class="login-wrap"><div class="card center"><h2>Lista não encontrada</h2></div></div>`;return;}
    const ev=evSnap.data(),L=lSnap.data();
    const now=Date.now(),ini=L.inicio?new Date(L.inicio).getTime():null,fim=L.fim?new Date(L.fim).getTime():null;
    if(ini&&now<ini){app.innerHTML=pub(`<h2>A lista ainda não abriu ⏳</h2><p class="muted">Abre em ${fmtDT(L.inicio)}</p>`);return;}
    if(fim&&now>fim){app.innerHTML=pub(`<h2>Lista encerrada 🚫</h2><p class="muted">Fechou em ${fmtDT(L.fim)}</p>`);return;}
    if(L.limite&&L.limite>0){const c=await FB.getDocs(FB.collection(DB,"eventos",evId,"listas",listaId,"cadastros"));if(c.size>=L.limite){app.innerHTML=pub(`<h2>Lista lotada 😱</h2><p class="muted">Todas as vagas foram preenchidas.</p>`);return;}}
    app.innerHTML=`<div class="login-wrap">
      <div class="card center">
        <span class="pill pill-green">${esc(ev.nome)}${ev.data?` · ${fmtData(ev.data)}`:''}</span>
        <h1 style="font-size:26px;margin-top:14px;color:var(--blue)">${esc(L.nome)}</h1>
        ${L.valor>0?`<div style="margin-top:8px"><span class="pill pill-amber">Entrada ${fmtBRL(L.valor)} · paga na portaria</span></div>`:`<div style="margin-top:8px"><span class="pill pill-gray">Lista OFF · grátis</span></div>`}
        ${ev.local?`<p class="muted" style="margin-top:10px">📍 ${esc(ev.local)}</p>`:''}
        ${ev.descricao?`<p class="muted" style="margin-top:6px;white-space:pre-line">${esc(ev.descricao)}</p>`:''}
      </div>
      <div class="card" id="formCard">
        <h2 style="font-size:17px;margin-bottom:8px">Adicione seu nome na lista</h2>
        <label>Nome completo</label><input id="pNome" placeholder="Seu nome completo" autocomplete="name">
        <label>WhatsApp (com DDD)</label><input id="pWpp" placeholder="(38) 9 9999-9999" inputmode="tel">
        <label>Sexo</label><select id="pSex"><option value="">Selecione…</option><option value="F">Feminino</option><option value="M">Masculino</option><option value="O">Outro</option></select>
        <button class="btn btn-green" style="width:100%;margin-top:20px" id="pSend">Entrar na lista</button>
      </div></div>`;
    $("#pSend").onclick=async()=>{
      const nome=$("#pNome").value.trim(),wpp=$("#pWpp").value.trim(),sex=$("#pSex").value;
      if(nome.length<3) return toast("Digite seu nome completo");
      if(wpp.replace(/\D/g,"").length<10) return toast("WhatsApp inválido");
      if(!sex) return toast("Selecione o sexo");
      $("#pSend").disabled=true;$("#pSend").textContent="enviando…";
      try{
        await FB.addDoc(FB.collection(DB,"eventos",evId,"listas",listaId,"cadastros"),{nome,nomeLower:nome.toLowerCase(),wpp,sex,checkin:false,criadoEm:FB.serverTimestamp()});
        $("#formCard").outerHTML=`<div class="card center" style="background:var(--green-soft);border-color:#bfe6d2">
          <h2 style="color:var(--green)">Tá na lista! ✅</h2>
          ${L.valor>0?`<p style="font-weight:700;font-size:17px;margin-top:6px">Pagamento de ${fmtBRL(L.valor)} na portaria</p><p class="muted" style="margin-top:6px">${esc(nome)}, é só chegar, falar seu nome e pagar na entrada.</p>`:`<p class="muted" style="margin-top:6px">${esc(nome)}, é só chegar e falar seu nome na portaria.</p>`}
          <span class="pill pill-blue" style="margin-top:14px">${esc(ev.nome)} · ${esc(L.nome)}</span></div>`;
      }catch(e){console.error(e);toast("Erro ao enviar, tente de novo");$("#pSend").disabled=false;$("#pSend").textContent="Entrar na lista";}
    };
  }catch(e){console.error(e);app.innerHTML=pub(`<h2>Erro ao carregar</h2><p class="muted">${esc(e.message)}</p>`);}
}
function pub(html){return `<div class="login-wrap"><div class="card center">${html}</div></div>`;}
function fmtDT(d){if(!d)return"";return new Date(d).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});}

/* =================== MODAL HELPERS =================== */
function openModal(html){$("#modalRoot").innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){$("#modalRoot").innerHTML="";}
function openConfirm(html,onYes){
  openModal(`<h2>Confirmar</h2><p class="muted" style="margin:8px 0 4px">${html}</p>
    <div class="row" style="margin-top:18px"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" id="cfYes">Apagar</button></div>`);
  $("#cfYes").onclick=onYes;
}
window.editarEvento=editarEvento;window.apagarEvento=apagarEvento;
window.editarLista=editarLista;window.apagarLista=apagarLista;
window.closeModal=closeModal;
</script>
